name: Hello Workflow

on:
  push:

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print Message
        run: echo "hello message"

      - name: Print Multiple Messages
        run: |
          echo "Welcome Students"
          echo "Learning GitHub Actions"
          echo "Today's Lab Session"

      - name: Show Current Directory
        run: pwd
      
      - name: List Files Before Checkout
        run: ls 

      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: List Files After Checkout
        run: ls

      - name: Read File
        run: cat index.txt
